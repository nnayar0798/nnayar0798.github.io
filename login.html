<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Yorkseed Platform</title>
    <link rel="stylesheet" href="css/buttons.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        body{
          font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
          background:linear-gradient(135deg,#1a1a1a 0%,#dc2626 100%);
          min-height:100vh;display:flex;align-items:center;justify-content:center;
          padding:1rem;
        }

        .login-container{
          background:rgba(255,255,255,.98);
          backdrop-filter:blur(20px);
          border-radius:20px;
          box-shadow:0 25px 50px rgba(0,0,0,.3);
          padding:2rem 3rem;
          width:100%;max-width:750px;
          position:relative;z-index:2;
        }

        .logo-section{text-align:center;margin-bottom:1.5rem}
        .logo-text{
          font-size:2rem;font-weight:700;
          background:linear-gradient(135deg,#dc2626 0%,#991b1b 100%);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        }
        .welcome-text{color:#666;margin-top:.5rem;font-size:1rem}

        .form-group{margin-bottom:1.2rem}
        .form-group label{display:block;color:#333;font-weight:600;margin-bottom:.5rem;font-size:1rem}

        .form-group input{
          width:100%;padding:.9rem 1rem;border:1px solid #e0e0e0;border-radius:12px;font-size:1rem;
          transition:border-color .2s ease, box-shadow .2s ease;
        }
        .form-group input:focus{
          outline:none;border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,.1);
        }

        /* Founder/Investor pill buttons */
        .user-type-selector{
          display:grid;grid-template-columns:1fr 1fr;gap:1rem;
        }
        .user-type-selector input[type="radio"]{
          position:absolute;opacity:0;pointer-events:none;
        }
        .user-type-btn{
          display:inline-flex;align-items:center;justify-content:center;
          width:100%;padding:1rem 1.25rem;border:2px solid #e2e8f0;border-radius:16px;
          background:#fff;color:#111;font-weight:600;letter-spacing:.3px;
          cursor:pointer;transition:transform .12s ease,border-color .2s ease,background .2s ease, box-shadow .2s ease;
        }
        .user-type-btn:hover{transform:translateY(-1px)}
        .user-type-selector input[type="radio"]:checked + label{
          background:#f3f7ff;border-color:#3b82f6;box-shadow:inset 0 0 0 2px #3b82f6;
        }

        .auth-btn{
          width:100%;background:#000;color:#fff;border:none;padding:14px 24px;border-radius:50px;
          font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s ease, box-shadow .2s ease;
          margin:1.2rem 0;
        }
        .auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(0,0,0,.12)}

        .banner{
          display:none;margin-bottom:1rem;padding:.75rem 1rem;border-radius:10px;font-size:.95rem;text-align:center;
        }
        .banner.error{background:#fee2e2;color:#991b1b}
        .banner.success{background:#dcfce7;color:#166534}

        .auth-footer{text-align:center;margin-top:1rem;color:#666}
        .auth-footer a{color:#dc2626;font-weight:600;text-decoration:none}
        .auth-footer a:hover{color:#991b1b}

        @media (max-width:640px){
          .login-container{padding:1.5rem}
          .user-type-selector{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo-section">
        <div class="logo-text">Yorkseed</div>
        <div class="welcome-text">Welcome to our Global Venture Network</div>
    </div>

    <!-- banners -->
    <div id="success-banner" class="banner success"></div>
    <div id="error-banner" class="banner error"></div>

    <form id="loginForm">
        <div class="form-group">
            <label>I am a:</label>
            <div class="user-type-selector">
                <input type="radio" id="founder" name="userType" value="founder" required>
                <label for="founder" class="user-type-btn">Founder</label>
                <input type="radio" id="investor" name="userType" value="investor">
                <label for="investor" class="user-type-btn">Investor</label>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <!-- ✅ No company-domain validation; any email is allowed -->
            <input type="email" id="email" name="email" placeholder="youremail@gmail.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="auth-btn" id="loginButton">Sign In</button>

        <p class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </p>
    </form>
</div>

<script src="js/nav.js"></script>
<script>
    // Show success banner if redirected after signup
    document.addEventListener('DOMContentLoaded', function(){
      const urlParams = new URLSearchParams(window.location.search);
      const successBanner = document.getElementById('success-banner');
      if (urlParams.get('verificationSent') === 'true') {
        successBanner.textContent = 'Verification email sent. Please check your inbox.';
        successBanner.style.display = 'block';
        history.replaceState({}, document.title, location.pathname);
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();

      const roleInput = document.querySelector('input[name="userType"]:checked');
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;

      const errorBanner = document.getElementById('error-banner');
      const successBanner = document.getElementById('success-banner');
      const submitBtn  = document.getElementById('loginButton');

      // reset banners
      errorBanner.style.display = 'none';
      successBanner.style.display = 'none';

      if (!roleInput || !email || !password){
        errorBanner.textContent = 'Please fill in all required fields.';
        errorBanner.style.display = 'block';
        return;
      }

      try{
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        const role = roleInput.value.toUpperCase(); // 'founder' or 'investor'
        const resp = await fetch('http://localhost:8080/AuthService/api/auth/login', {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'Accept':'application/json',
            'X-User-Role': role // if unused server-side, safe to leave or remove
          },
          body: JSON.stringify({ email, password, role })
        });

        // try to parse response body when present
        let data = {};
        const ct = resp.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          data = await resp.json().catch(() => ({}));
        } else {
          const text = await resp.text();
          try { data = JSON.parse(text) } catch { data = { message: text } }
        }

        if (!resp.ok) {
          throw new Error(data.message || `Login failed (${resp.status}). Please try again.`);
        }

        // Your UserService currently returns LoginResponse with success/message and optionally user
        // If you later add token, store it here.
        if (data.token) localStorage.setItem('authToken', data.token);
        localStorage.setItem('userRole', role);
        localStorage.setItem('userEmail', email);

        // Navigate
        window.location.href = 'members.html';
      }catch(err){
        errorBanner.textContent = err.message || 'An error occurred. Please try again later.';
        errorBanner.style.display = 'block';
      }finally{
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
</script>
</body>
</html>
